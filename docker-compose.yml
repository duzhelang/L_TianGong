version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: ecocarbon-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: ecocarbon
      MYSQL_USER: ecocarbon
      MYSQL_PASSWORD: ecocarbon123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database_init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - ecocarbon-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: ecocarbon-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - ecocarbon-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ecocarbon-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/ecocarbon?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
      SPRING_DATASOURCE_USERNAME: ecocarbon
      SPRING_DATASOURCE_PASSWORD: ecocarbon123
      SPRING_REDIS_HOST: redis
      SPRING_REDIS_PORT: 6379
      JWT_SECRET: ecocarbon-mrv-jwt-secret-key-2024
      JWT_EXPIRATION: 7200000
      AI_API_KEY: ${AI_API_KEY}
      AI_API_URL: ${AI_API_URL}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecocarbon-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ecocarbon-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ecocarbon-network

volumes:
  mysql_data:
  redis_data:

networks:
  ecocarbon-network:
    driver: bridge
